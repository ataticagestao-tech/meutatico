version: "3.8"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    expose:
      - "8000"
    env_file:
      - .env.production
    volumes:
      - sqlite_data:/app/data
      - uploads_data:/app/uploads
    command: >
      sh -c "
        cp /app/data/tatica_gestap.db /app/tatica_gestap.db 2>/dev/null || true &&
        alembic upgrade head &&
        cp /app/tatica_gestap.db /app/data/tatica_gestap.db &&
        ln -sf /app/data/tatica_gestap.db /app/tatica_gestap.db &&
        uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 2
      "
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/docs')"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: https://meutatico.com/api/v1
        NEXT_PUBLIC_APP_NAME: Tatica Gestap
    restart: unless-stopped
    expose:
      - "3000"
    environment:
      NODE_ENV: production
      HOSTNAME: 0.0.0.0
      PORT: 3000
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - certbot_etc:/etc/letsencrypt:ro
      - certbot_var:/var/lib/letsencrypt
      - certbot_webroot:/var/www/certbot
    depends_on:
      - backend
      - frontend

  certbot:
    image: certbot/certbot
    volumes:
      - certbot_etc:/etc/letsencrypt
      - certbot_var:/var/lib/letsencrypt
      - certbot_webroot:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do sleep 12h & wait $${!}; certbot renew --webroot -w /var/www/certbot; done'"

volumes:
  sqlite_data:
  uploads_data:
  certbot_etc:
  certbot_var:
  certbot_webroot:
