# Redirect HTTP to HTTPS
server {
    listen 80;
    server_name meutatico.com www.meutatico.com;

    # Let's Encrypt challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS server
server {
    listen 443 ssl http2;
    server_name meutatico.com www.meutatico.com;

    # SSL certificates (Let's Encrypt)
    ssl_certificate /etc/letsencrypt/live/meutatico.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/meutatico.com/privkey.pem;

    # SSL security settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' https://meutatico.com https://*.supabase.co;" always;

    # Backend API - auth endpoints com rate limiting restrito
    location /api/v1/auth/ {
        limit_req zone=auth_limit burst=10 nodelay;
        proxy_pass http://backend:8000/api/v1/auth/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_connect_timeout 10s;
    }

    # Backend API - demais endpoints
    location /api/ {
        limit_req zone=api_limit burst=50 nodelay;
        proxy_pass http://backend:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
    }

    # Backend uploads com rate limiting
    location /uploads/ {
        limit_req zone=upload_limit burst=10 nodelay;
        proxy_pass http://backend:8000/uploads/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;

        # Cache de arquivos estáticos (logos, anexos)
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # Health check (sem rate limiting)
    location /health {
        proxy_pass http://backend:8000/health;
        proxy_set_header Host $host;
    }

    # Cache para assets do Next.js
    location /_next/static/ {
        proxy_pass http://frontend:3000/_next/static/;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Frontend (Next.js)
    location / {
        proxy_pass http://frontend:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # BLOQUEIO: não expor docs/openapi em produção
    location /docs { return 404; }
    location /redoc { return 404; }
    location /openapi.json { return 404; }
}
